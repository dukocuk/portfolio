<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== SEO ===== -->
    <title>Duran Köse — Softwareingeniør & Full-Stack-udvikler | MSc DTU</title>
    <meta
      name="description"
      content="Softwareingeniør med MSc i Software Technology (DTU) — arbejder med full-stack, mobil, enterprise/SAP-systemer, autentificering og integration. Bosat i Taastrup, Danmark."
    />
    <meta name="author" content="Duran Köse" />
    <meta name="theme-color" content="#090D12" />

    <!-- Fonts: preconnect + stylesheet here (not a CSS @import) so the font
         CSS downloads in parallel with the bundle instead of after it -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
    />
    <link rel="canonical" href="https://dukocuk.github.io/portfolio/" />

    <!-- ===== Open Graph ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Duran Köse — Softwareingeniør & Full-Stack-udvikler" />
    <meta
      property="og:description"
      content="Full-stack-udvikling med enterprise-disciplin — projekter inden for computer vision, IoT-sikkerhed, systemintegration og mobil."
    />
    <meta property="og:url" content="https://dukocuk.github.io/portfolio/" />
    <meta property="og:image" content="https://dukocuk.github.io/portfolio/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Duran Köse — Softwareingeniør & Full-Stack-udvikler" />
    <meta property="og:locale" content="da_DK" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:site_name" content="Duran Köse — Portfolio" />

    <!-- ===== Twitter ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Duran Köse — Softwareingeniør & Full-Stack-udvikler" />
    <meta
      name="twitter:description"
      content="Full-stack-udvikling med enterprise-disciplin — projekter inden for computer vision, IoT-sikkerhed, systemintegration og mobil."
    />
    <meta name="twitter:image" content="https://dukocuk.github.io/portfolio/og-image.png" />
    <meta name="twitter:image:alt" content="Duran Köse — Softwareingeniør & Full-Stack-udvikler" />

    <!-- ===== Structured data ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Duran Köse",
        "jobTitle": "Software Engineer / Full-Stack Developer",
        "url": "https://dukocuk.github.io/portfolio/",
        "image": "https://dukocuk.github.io/portfolio/og-image.png",
        "email": "mailto:duran.kose@protonmail.com",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Taastrup",
          "addressCountry": "DK"
        },
        "alumniOf": {
          "@type": "CollegeOrUniversity",
          "name": "Technical University of Denmark (DTU)"
        }
      }
    </script>

    <!-- Apply saved language before paint so <html lang> matches the chosen language -->
    <script>
      (function () {
        try {
          var lang = localStorage.getItem('lang');
          if (lang === 'da' || lang === 'en') document.documentElement.lang = lang;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
