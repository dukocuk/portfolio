    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== SEO ===== -->
    <title>Duran Köse — Software Engineer & Full-Stack Developer | MSc DTU</title>
    <meta

    <link rel="canonical" href="https://dukocuk.github.io/portfolio/" />

    <!-- ===== Open Graph ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Duran Köse — Software Engineer & SAP/Enterprise Consultant" />
    <meta
      property="og:description"
      content="Full-stack engineering with enterprise discipline — projects in computer vision, IoT security, system integration, and mobile."
    />
    <meta property="og:url" content="https://dukocuk.github.io/portfolio/" />
    <meta property="og:image" content="https://dukocuk.github.io/portfolio/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta property="og:locale" content="en_US" />

    <!-- ===== Twitter ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Duran Köse — Software Engineer & SAP/Enterprise Consultant" />
    <meta
      name="twitter:description"
      content="Full-stack engineering with enterprise discipline — projects in computer vision, IoT security, system integration, and mobile."
    />
    <meta name="twitter:image" content="https://dukocuk.github.io/portfolio/og-image.png" />
    <meta name="twitter:image:alt" content="Duran Köse — Software Engineer & Full-Stack Developer" />

    <!-- ===== Structured data ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Duran Köse",
        "jobTitle": "Software Engineer / Full-Stack Developer",
        "url": "https://dukocuk.github.io/portfolio/",
        "email": "mailto:duran.kse@gmail.com",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Taastrup",
          "addressCountry": "DK"
        },
        "alumniOf": {
          "@type": "CollegeOrUniversity",
          "name": "Technical University of Denmark (DTU)"
        }
      }
    </script>

    <!-- Apply saved/system theme before paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersLight =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = saved || (prefersLight ? 'light' : 'dark');
          if (theme === 'light') document.documentElement.classList.add('light');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
